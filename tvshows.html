<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Browse top TV shows - IMDb Clone."/>
  <title>Top TV Shows – IMDb Clone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg imdb-navbar sticky-top" id="mainNavbar">
  <div class="container-fluid px-3 px-lg-4">
    <a class="navbar-brand me-3" href="index.html"><span class="imdb-logo">IMDb</span></a>
    <button class="navbar-toggler border-0 text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto align-items-lg-center gap-lg-1">
        <li class="nav-item"><a class="nav-link nav-pill text-white" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link nav-pill text-white" href="movies.html">Movies</a></li>
        <li class="nav-item"><a class="nav-link nav-pill text-warning fw-600" href="tvshows.html">TV Shows</a></li>
        <li class="nav-item"><a class="nav-link nav-pill text-white" href="watchlist.html">Watchlist</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0 flex-grow-1 mx-lg-3" style="max-width:420px; position:relative;">
        <div class="input-group search-bar-group w-100">
          <select class="form-select search-category-select" id="searchCategory" style="max-width:110px;">
            <option value="all">All</option>
            <option value="movies">Movies</option>
            <option value="tv" selected>TV Shows</option>
          </select>
          <input type="text" class="form-control search-input" id="globalSearch" placeholder="Search TV Shows" autocomplete="off"/>
          <button class="btn btn-warning search-btn" type="button" onclick="performSearch()"><i class="bi bi-search"></i></button>
        </div>
        <div class="search-suggestions" id="searchSuggestions"></div>
      </div>
      <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0">
        <a href="watchlist.html" class="btn btn-outline-light btn-sm rounded-pill px-3">
          <i class="bi bi-bookmark-fill text-warning"></i>
          <span class="badge bg-warning text-dark ms-1" id="navWatchlistCount">0</span>
        </a>
        <a href="#" class="btn btn-warning btn-sm rounded-pill px-3 fw-600">Sign In</a>
      </div>
    </div>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="bg-darker-custom py-5 position-relative overflow-hidden">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%, rgba(245,197,24,0.06) 0%, transparent 60%);pointer-events:none;"></div>
  <div class="container-fluid px-4">
    <nav aria-label="breadcrumb" class="mb-2">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="index.html" class="text-muted text-decoration-none">Home</a></li>
        <li class="breadcrumb-item active text-warning">TV Shows</li>
      </ol>
    </nav>
    <div class="d-flex align-items-end justify-content-between flex-wrap gap-3">
      <div>
        <h1 class="section-title fs-2 mb-2">Top TV Shows</h1>
        <p class="text-muted mb-0">Discover critically acclaimed series from around the world</p>
      </div>
      <div class="d-flex gap-2 flex-wrap">
        <button class="tv-filter-btn btn btn-warning rounded-pill px-3 text-dark fw-600 btn-sm active" data-filter="all">All</button>
        <button class="tv-filter-btn btn btn-outline-secondary rounded-pill px-3 btn-sm" data-filter="drama">Drama</button>
        <button class="tv-filter-btn btn btn-outline-secondary rounded-pill px-3 btn-sm" data-filter="action">Action</button>
        <button class="tv-filter-btn btn btn-outline-secondary rounded-pill px-3 btn-sm" data-filter="sci-fi">Sci-Fi</button>
        <button class="tv-filter-btn btn btn-outline-secondary rounded-pill px-3 btn-sm" data-filter="thriller">Thriller</button>
      </div>
    </div>
  </div>
</div>

<!-- FEATURED TV - LARGE HERO CARD -->
<div class="bg-dark-custom py-4">
  <div class="container-fluid px-4">
    <h3 class="section-title mb-4"><i class="bi bi-fire text-danger me-2"></i>Trending Now</h3>
    <div class="row g-3" id="featuredTVRow">
      <!-- Filled by JS -->
    </div>
  </div>
</div>

<!-- ALL SHOWS GRID -->
<div class="bg-darker-custom py-5">
  <div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3 class="section-title mb-0">All Shows</h3>
      <span class="text-muted small" id="tvCount"></span>
    </div>
    <div class="row g-3" id="allTVGrid">
      <!-- Filled by JS -->
    </div>
  </div>
</div>

<!-- TOP 5 countdown -->
<div class="bg-dark-custom py-5">
  <div class="container-fluid px-4">
    <h3 class="section-title mb-4"><i class="bi bi-trophy-fill text-warning me-2"></i>IMDb Top 5 TV Shows</h3>
    <div class="row g-3" id="top5TV">
      <!-- Filled by JS -->
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="imdb-footer py-4">
  <div class="container-fluid px-4 text-center">
    <span class="imdb-logo mb-2 d-inline-block" style="font-size:1.2rem;">IMDb</span>
    <p class="text-muted small mb-0">© 2025 IMDb Clone — Demo purposes only.</p>
  </div>
</footer>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999;">
  <div id="mainToast" class="toast align-items-center border-0 text-white bg-dark" role="alert">
    <div class="d-flex">
      <div class="toast-body fw-500" id="toastBody">Updated!</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<button class="back-to-top" id="backToTop" onclick="scrollToTop()"><i class="bi bi-chevron-up"></i></button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/tmdb.js"></script>
<script src="js/app.js"></script>
<script src="js/tvshows.js"></script>
</body>
</html>
