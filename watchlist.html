<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="My Watchlist – IMDb Clone. Track movies and shows you want to watch."/>
  <title>My Watchlist – IMDb Clone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg imdb-navbar sticky-top" id="mainNavbar">
  <div class="container-fluid px-3 px-lg-4">
    <a class="navbar-brand me-3" href="index.html"><span class="imdb-logo">IMDb</span></a>
    <button class="navbar-toggler border-0 text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto align-items-lg-center gap-lg-1">
        <li class="nav-item"><a class="nav-link nav-pill text-white" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link nav-pill text-white" href="movies.html">Movies</a></li>
        <li class="nav-item"><a class="nav-link nav-pill text-white" href="tvshows.html">TV Shows</a></li>
        <li class="nav-item"><a class="nav-link nav-pill text-warning fw-600" href="watchlist.html">Watchlist</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0 flex-grow-1 mx-lg-3" style="max-width:400px; position:relative;">
        <div class="input-group search-bar-group w-100">
          <select class="form-select search-category-select" id="searchCategory" style="max-width:110px;">
            <option value="all">All</option>
            <option value="movies">Movies</option>
            <option value="tv">TV Shows</option>
          </select>
          <input type="text" class="form-control search-input" id="globalSearch" placeholder="Search IMDb" autocomplete="off"/>
          <button class="btn btn-warning search-btn" type="button" onclick="performSearch()"><i class="bi bi-search"></i></button>
        </div>
        <div class="search-suggestions" id="searchSuggestions"></div>
      </div>
      <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0">
        <a href="watchlist.html" class="btn btn-warning btn-sm rounded-pill px-3">
          <i class="bi bi-bookmark-fill me-1"></i>
          <span id="navWatchlistCount">0</span>
        </a>
        <a href="#" class="btn btn-outline-light btn-sm rounded-pill px-3 fw-600">Sign In</a>
      </div>
    </div>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="bg-darker-custom py-5">
  <div class="container-fluid px-4">
    <nav aria-label="breadcrumb" class="mb-2">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="index.html" class="text-muted text-decoration-none">Home</a></li>
        <li class="breadcrumb-item active text-warning">My Watchlist</li>
      </ol>
    </nav>
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-3">
      <div>
        <h1 class="section-title fs-2 mb-2">My Watchlist</h1>
        <p class="text-muted mb-0">Your saved movies and shows — <span id="watchlistCountText">0 items</span></p>
      </div>
      <div class="d-flex gap-2 flex-wrap" id="watchlistHeaderActions">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="bg-dark-custom min-vh-100 py-5">
  <div class="container-fluid px-4">

    <!-- Watchlist stats bar (shown when items exist) -->
    <div id="watchlistStatsBar" class="d-none mb-4">
      <div class="row g-3 mb-4" id="statsCards">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- Sort options -->
    <div class="d-flex flex-wrap gap-2 align-items-center mb-4" id="watchlistControls" style="display:none!important;">
      <span class="text-muted small">Sort by:</span>
      <button class="genre-tab active" data-sort="newest" onclick="sortWatchlist('newest', this)">Recently Added</button>
      <button class="genre-tab" data-sort="rating" onclick="sortWatchlist('rating', this)">Highest Rated</button>
      <button class="genre-tab" data-sort="title" onclick="sortWatchlist('title', this)">A-Z</button>
      <button class="genre-tab" data-sort="oldest" onclick="sortWatchlist('oldest', this)">Oldest</button>
    </div>

    <!-- Watchlist items -->
    <div id="watchlistItems">
      <!-- Filled by JS -->
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="imdb-footer py-4">
  <div class="container-fluid px-4 text-center">
    <span class="imdb-logo mb-2 d-inline-block" style="font-size:1.2rem;">IMDb</span>
    <p class="text-muted small mb-0">© 2025 IMDb Clone — Demo purposes only.</p>
  </div>
</footer>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999;">
  <div id="mainToast" class="toast align-items-center border-0 text-white bg-dark" role="alert">
    <div class="d-flex">
      <div class="toast-body fw-500" id="toastBody">Updated!</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<button class="back-to-top" id="backToTop" onclick="scrollToTop()"><i class="bi bi-chevron-up"></i></button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/tmdb.js"></script>
<script src="js/app.js"></script>
<script src="js/watchlist.js"></script>
</body>
</html>
