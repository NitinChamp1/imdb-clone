<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Browse all movies - IMDb Clone. Filter by genre, year, and rating."/>
  <title>Browse Movies – IMDb Clone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body>

<!-- NAVBAR (same as index) -->
<nav class="navbar navbar-expand-lg imdb-navbar sticky-top" id="mainNavbar">
  <div class="container-fluid px-3 px-lg-4">
    <a class="navbar-brand me-3" href="index.html"><span class="imdb-logo">IMDb</span></a>
    <button class="navbar-toggler border-0 text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto align-items-lg-center gap-lg-1">
        <li class="nav-item"><a class="nav-link nav-pill text-white" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link nav-pill text-warning fw-600" href="movies.html">Movies</a></li>
        <li class="nav-item"><a class="nav-link nav-pill text-white" href="tvshows.html">TV Shows</a></li>
        <li class="nav-item"><a class="nav-link nav-pill text-white" href="celebrities.html">Celebrities</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0 flex-grow-1 mx-lg-3" style="max-width:420px; position:relative;">
        <div class="input-group search-bar-group w-100">
          <select class="form-select search-category-select" id="searchCategory" style="max-width:110px;">
            <option value="all">All</option>
            <option value="movies" selected>Movies</option>
            <option value="tv">TV Shows</option>
          </select>
          <input type="text" class="form-control search-input" id="globalSearch" placeholder="Search IMDb" autocomplete="off"/>
          <button class="btn btn-warning search-btn" type="button" onclick="performSearch()"><i class="bi bi-search"></i></button>
        </div>
        <div class="search-suggestions" id="searchSuggestions"></div>
      </div>
      <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0">
        <a href="watchlist.html" class="btn btn-outline-light btn-sm rounded-pill px-3">
          <i class="bi bi-bookmark-fill text-warning"></i>
          <span class="badge bg-warning text-dark ms-1" id="navWatchlistCount">0</span>
        </a>
        <a href="#" class="btn btn-warning btn-sm rounded-pill px-3 fw-600">Sign In</a>
      </div>
    </div>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="bg-darker-custom py-4 border-bottom border-secondary border-opacity-25">
  <div class="container-fluid px-4">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-1">
        <li class="breadcrumb-item"><a href="index.html" class="text-muted text-decoration-none">Home</a></li>
        <li class="breadcrumb-item active text-warning">Movies</li>
      </ol>
    </nav>
    <h1 class="section-title fs-3 mb-0">Browse Movies</h1>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="bg-dark-custom py-4 min-vh-100">
  <div class="container-fluid px-4">

    <!-- Filter Bar -->
    <div class="filter-bar mb-4">
      <div class="row g-2 align-items-center">
        <div class="col-12 col-sm-6 col-lg-2">
          <label class="text-muted small mb-1">Genre</label>
          <select class="form-select filter-select w-100" id="filterGenre">
            <option value="all">All Genres</option>
            <option value="action">Action</option>
            <option value="drama">Drama</option>
            <option value="comedy">Comedy</option>
            <option value="sci-fi">Sci-Fi</option>
            <option value="thriller">Thriller</option>
          </select>
        </div>
        <div class="col-12 col-sm-6 col-lg-2">
          <label class="text-muted small mb-1">Year</label>
          <select class="form-select filter-select w-100" id="filterYear">
            <option value="all">All Years</option>
            <option value="2020s">2020s</option>
            <option value="2010s">2010s</option>
            <option value="2000s">2000s</option>
            <option value="1990s">1990s</option>
            <option value="older">Before 1990</option>
          </select>
        </div>
        <div class="col-12 col-sm-6 col-lg-2">
          <label class="text-muted small mb-1">Min Rating</label>
          <select class="form-select filter-select w-100" id="filterRating">
            <option value="0">Any Rating</option>
            <option value="9">9.0+</option>
            <option value="8">8.0+</option>
            <option value="7">7.0+</option>
            <option value="6">6.0+</option>
          </select>
        </div>
        <div class="col-12 col-sm-6 col-lg-2">
          <label class="text-muted small mb-1">Sort By</label>
          <select class="form-select filter-select w-100" id="sortBy">
            <option value="rating">Top Rated</option>
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="title">Title A-Z</option>
            <option value="votes">Most Popular</option>
          </select>
        </div>
        <div class="col-12 col-lg-4 d-flex align-items-end gap-2">
          <button class="btn btn-warning rounded-pill px-4 fw-600 mt-3" onclick="applyFilters()">
            <i class="bi bi-funnel me-1"></i>Apply Filters
          </button>
          <button class="btn btn-outline-secondary rounded-pill px-3 mt-3" onclick="resetFilters()">
            <i class="bi bi-x-lg"></i>
          </button>
          <div class="ms-auto d-flex gap-2 mt-3">
            <button class="btn btn-sm btn-outline-secondary rounded" id="viewGrid" onclick="setView('grid')" title="Grid View">
              <i class="bi bi-grid-3x3-gap-fill"></i>
            </button>
            <button class="btn btn-sm btn-outline-secondary rounded" id="viewList" onclick="setView('list')" title="List View">
              <i class="bi bi-list-ul"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Results count -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <p class="text-muted small mb-0" id="resultsCount">Showing all 20 movies</p>
      <div class="d-flex align-items-center gap-2">
        <span class="text-muted small">View as:</span>
        <span class="badge bg-secondary" id="currentViewLabel">Grid</span>
      </div>
    </div>

    <!-- Movies Grid/List -->
    <div id="moviesContainer" class="row g-3">
      <!-- Filled by JS -->
    </div>

    <!-- No Results -->
    <div id="noResults" class="text-center py-5 d-none">
      <i class="bi bi-search fs-1 text-muted mb-3 d-block"></i>
      <h4 class="text-muted">No movies found</h4>
      <p class="text-muted">Try adjusting your filters.</p>
      <button class="btn btn-warning rounded-pill px-4" onclick="resetFilters()">Reset Filters</button>
    </div>

    <!-- Pagination -->
    <div class="d-flex justify-content-center mt-5" id="paginationContainer">
      <!-- Filled by JS -->
    </div>

  </div>
</div>

<!-- Footer -->
<footer class="imdb-footer py-4">
  <div class="container-fluid px-4 text-center">
    <span class="imdb-logo mb-2 d-inline-block" style="font-size:1.2rem;">IMDb</span>
    <p class="text-muted small mb-0">© 2025 IMDb Clone — For demonstration purposes only.</p>
  </div>
</footer>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999;">
  <div id="mainToast" class="toast align-items-center border-0 text-white bg-dark" role="alert">
    <div class="d-flex">
      <div class="toast-body fw-500" id="toastBody">Updated watchlist!</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<button class="back-to-top" id="backToTop" onclick="scrollToTop()"><i class="bi bi-chevron-up"></i></button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Firebase SDK (v8 Compat) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="js/config.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-service.js"></script>
<script src="js/data.js"></script>
<script src="js/tmdb.js"></script>
<script src="js/app.js"></script>
<script src="js/movies.js"></script>
</body>
</html>
