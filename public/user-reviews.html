<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="My Profile – RNDb Clone. View your stats and reviews."/>
  <title>My Profile – RNDb Clone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body>

<!-- NAVBAR (Will be initialized by app.js) -->
<nav class="navbar navbar-expand-lg rndb-navbar sticky-top" id="mainNavbar">
  <div class="container-fluid px-3 px-lg-4">
    <a class="navbar-brand me-3" href="index.html"><span class="rndb-logo">RNDb</span></a>
    <button class="navbar-toggler border-0 text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto align-items-lg-center gap-lg-1">
        <li class="nav-item"><a class="nav-link nav-pill text-white" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link nav-pill text-white" href="movies.html">Movies</a></li>
        <li class="nav-item"><a class="nav-link nav-pill text-white" href="tvshows.html">TV Shows</a></li>
        <li class="nav-item"><a class="nav-link nav-pill text-white" href="discover.html">Discover</a></li>
        <li class="nav-item"><a class="nav-link nav-pill text-warning fw-600" href="profile.html">Profile</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0 flex-grow-1 mx-lg-3" style="max-width:400px; position:relative;">
        <div class="input-group search-bar-group w-100">
          <input type="hidden" id="searchCategory" value="all">
          <button class="btn search-category-btn dropdown-toggle d-flex align-items-center justify-content-between" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="max-width:110px; background:#2a2a2a; border:1px solid #3a3a3a; color:#fff; border-radius: 4px 0 0 4px; padding-right: 12px;">
            <span id="searchCategoryLabel" class="me-2">All</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-dark">
            <li><a class="dropdown-item category-item" href="#" data-value="all">All</a></li>
            <li><a class="dropdown-item category-item" href="#" data-value="movies">Movies</a></li>
            <li><a class="dropdown-item category-item" href="#" data-value="tv">TV Shows</a></li>
            <li><a class="dropdown-item category-item" href="#" data-value="people">People</a></li>
          </ul>
          <input type="text" class="form-control search-input" id="globalSearch" placeholder="Search RNDb" autocomplete="off"/>
          <button class="btn btn-warning search-btn" type="button" onclick="performSearch()"><i class="bi bi-search"></i></button>
        </div>
        <div class="search-suggestions" id="searchSuggestions"></div>
      </div>
      <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0">
        <a href="watchlist.html" class="btn btn-warning btn-sm rounded-pill px-3">
          <i class="bi bi-bookmark-fill me-1"></i>
          <span id="navWatchlistCount">0</span>
        </a>
        <button class="btn btn-outline-light btn-sm rounded-pill px-3 fw-600" id="navSignInBtn" onclick="openLoginModal()">Sign In</button>
      </div>
    </div>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="bg-darker-custom py-5">
  <div class="container-fluid px-4">
    <div class="row align-items-center">
      <div class="col-md-8">
        <h1 class="section-title fs-1 mb-1">My Reviews</h1>
        <p class="text-muted mb-0">Browse all your submitted reviews</p>
      </div>
      <div class="col-md-4 text-md-end mt-4 mt-md-0">
        <a href="profile.html" class="btn btn-outline-light rounded-pill px-4">
          <i class="bi bi-arrow-left me-2"></i>Back to Profile
        </a>
      </div>
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="bg-dark-custom min-vh-100 py-5">
  <div class="container-fluid px-4">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3 class="section-title mb-0">All Reviews</h3>
          <select id="sortReviewsSelect" class="form-select bg-dark text-white border-secondary w-auto">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="highest">Highest Rating</option>
            <option value="lowest">Lowest Rating</option>
          </select>
        </div>
        
        <div id="userReviewsContainer">
          <div class="text-center py-5">
            <div class="spinner-border text-warning" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
        </div>

        <!-- Pagination Controls -->
        <nav aria-label="Review pagination" class="mt-4" id="paginationContainer">
        </nav>
      </div>
    </div>
  </div>
</div>



<!-- Footer -->
<footer class="rndb-footer py-4">
  <div class="container-fluid px-4 text-center">
    <span class="rndb-logo mb-2 d-inline-block" style="font-size:1.2rem;">RNDb</span>
  </div>
</footer>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999;">
  <div id="mainToast" class="toast align-items-center border-0 text-white bg-dark" role="alert">
    <div class="d-flex">
      <div class="toast-body fw-500" id="toastBody">Updated!</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<button class="back-to-top" id="backToTop" onclick="scrollToTop()"><i class="bi bi-chevron-up"></i></button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script src="js/config.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-service.js"></script>
<script src="js/data.js"></script>
<script src="js/tmdb.js"></script>
<script src="js/app.js"></script>
<script src="js/user-reviews.js"></script>
</body>
</html>
